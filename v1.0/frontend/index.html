<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polaris Dispatcher Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --border: #334155;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Sidebar Styling */
        #sidebar { 
            width: 380px; 
            padding: 20px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        
        h2 { margin-top: 0; color: var(--text-main); font-size: 22px; display: flex; align-items: center; gap: 10px; }
        h3 { margin-bottom: 10px; margin-top: 20px; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .control-group { 
            background: var(--bg-dark); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            margin-bottom: 15px; 
        }

        /* Select Dropdown */
        select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        /* Buttons */
        button { 
            width: 100%; padding: 10px; margin-top: 8px; cursor: pointer; border: none; 
            border-radius: 6px; font-weight: 600; font-size: 13px; transition: all 0.2s ease; 
        }
        .btn-primary { background-color: var(--accent-blue); color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-danger { background-color: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); }
        .btn-danger:hover { background-color: rgba(239, 68, 68, 0.1); }
        
        /* FSM Buttons */
        .btn-arrive { background-color: var(--accent-orange); color: white; }
        .btn-start { background-color: var(--accent-blue); color: white; }
        .btn-complete { background-color: var(--accent-green); color: white; }

        /* Trip Simulator Cards */
        .trip-card {
            background: #0f172a; border-left: 4px solid var(--accent-blue);
            padding: 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .trip-card .header { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .trip-card .status { font-size: 14px; font-weight: bold; margin-bottom: 8px; }

        /* Terminal Log Styling */
        .log { 
            font-size: 11px; flex-grow: 1; overflow-y: auto; background: #000; 
            padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            font-family: 'Courier New', monospace; color: #10b981; min-height: 150px;
        }
        .log div { margin-bottom: 4px; line-height: 1.4; }
        .log .time { color: #64748b; margin-right: 8px; }
        .log .error { color: #ef4444; }
        .log .highlight { color: #facc15; }

        #map { flex-grow: 1; background: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>✨ Polaris Engine v1.2</h2>
    
    <div class="control-group">
        <strong style="color: var(--text-muted); font-size: 13px;">Operation Mode</strong>
        <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 14px;">
            <label><input type="radio" name="mode" value="spawn" checked> 🚖 Spawn Asset</label>
            <label><input type="radio" name="mode" value="find"> 🔍 Request Match</label>
        </div>
    </div>

    <div class="control-group">
        <strong style="color: var(--text-muted); font-size: 13px;">🚕 Vehicle Target Class</strong><br>
        <select id="vehicleType">
            <option value="4" selected>Sedan (Class-4)</option>
            <option value="1">Bike (Class-1)</option>
            <option value="2">Auto Rickshaw (Class-2)</option>
            <option value="8">SUV (Class-8)</option>
        </select>
    </div>
    
    <div style="margin-top: 10px;">
        <button class="btn-primary" onclick="simulateChennaiTraffic()">Deploy 10 Test Vehicles</button>
        <button style="background-color: var(--accent-orange); color: white;" onclick="triggerSurgeSpike()">⚡ Trigger Demand Spike (Surge)</button>
        <button class="btn-danger" onclick="clearMap()">Purge System (Reset)</button>
    </div>

    <h3>📡 Active Trip Operations</h3>
    <div id="active-trips-container">
        <div style="font-size: 12px; color: var(--text-muted); font-style: italic;">No active trips. Book a ride to begin simulation.</div>

        <button class="btn-primary" onclick="simulateChennaiTraffic()">Deploy 10 Test Vehicles</button>
        <button class="btn-danger" onclick="clearMap()">Purge System (Reset)</button>
    </div>
</div>

    function spawnDriverBot(startLat, startLon) {
        const id = "V-" + Math.floor(Math.random() * 10000);
        const assets = [1, 2, 4, 8];
        const assetType = assets[Math.floor(Math.random() * assets.length)];
        let iconText = assetType === 1 ? '🏍️' : assetType === 2 ? '🛺' : assetType === 8 ? '🚙' : '🚕';
        let typeName = assetType === 1 ? 'Bike' : assetType === 2 ? 'Auto' : assetType === 8 ? 'SUV' : 'Sedan';

        const socket = new WebSocket("ws://localhost:6080/ws/driver");
        
        const marker = L.marker([startLat, startLon], {icon: availableIcon}).addTo(map)
            .bindPopup(`<div style="text-align:center;"><b>${iconText} ${id}</b><br><span style="color:#94a3b8; font-size:11px;">Class: ${typeName}</span><br><span style="color:#10b981">● Active</span></div>`);
        
        drivers.push({ id: id, marker: marker, assetType: assetType, iconText: iconText });

        socket.onopen = () => {
            log(`[Uplink] ${iconText} ${id} telemetry active (Class-${assetType}).`);
            let angle = Math.random() * Math.PI * 2; 
            const speed = 0.0001 + (Math.random() * 0.0001);

            setInterval(() => {
                if (socket.readyState !== WebSocket.OPEN) return;
                angle += (Math.random() - 0.5) * 0.1; 
                const newLat = marker.getLatLng().lat + Math.sin(angle) * speed;
                const newLon = marker.getLatLng().lng + Math.cos(angle) * speed;
                marker.setLatLng([newLat, newLon]);
                
                socket.send(JSON.stringify({ 
                    driver_id: id, 
                    lat: newLat, 
                    lon: newLon,
                    asset_type: assetType 
                }));
            }, 1000);
        };
    }

    // OPTIMIZED: Uses Table API data for speed, draws dashed proximity lines
    async function findRide(lat, lon) {
        matchLines.forEach(line => map.removeLayer(line));
        matchLines = [];
        
        const selectedAsset = document.getElementById('vehicleType').value;
        const typeName = selectedAsset === '1' ? 'Bike' : selectedAsset === '2' ? 'Auto' : selectedAsset === '8' ? 'SUV' : 'Sedan';
        
        log(`[Query] Scanning for Class-${selectedAsset} (${typeName})...`);

        try {
            const res = await fetch(`http://localhost:6080/ride/match?lat=${lat}&lon=${lon}&asset_type=${selectedAsset}`);
            const data = await res.json();

            if (data.matches && data.matches.length > 0) {
                log(`[Match] Located ${data.matches.length} valid vehicles.`);
                
                data.matches.forEach(d => {
                    const etaMins = d.eta_seconds ? Math.round(d.eta_seconds / 60) : "?";
                    const distKm = d.route_distance_meters ? (d.route_distance_meters / 1000).toFixed(1) : "?";
                    let resultIcon = d.asset_type === 1 ? '🏍️' : d.asset_type === 2 ? '🛺' : d.asset_type === 8 ? '🚙' : '🚕';

                    const surgeHtml = d.surge_multiplier > 1.0 
                        ? `<br><span style="color:#ef4444; font-size: 11px; font-weight:bold;">⚡ ${d.surge_multiplier.toFixed(1)}x SURGE</span>` 
                        : '';

                    // Draw the lightweight dashed line for the search phase
                    const line = L.polyline([[lat, lon], [d.lat, d.lon]], { 
                        color: '#94a3b8', dashArray: '5, 10', weight: 2 
                    }).addTo(map);
                    
                    matchLines.push(line);

                    // Updated Button with full coordinate payload
                    line.bindPopup(`
                        <div style="text-align:center;">
                            <b>${resultIcon} ${d.id}</b><br>
                            <span style="color:#10b981; font-size: 18px;"><b>₹${Math.round(d.estimated_fare_inr)}</b></span>${surgeHtml}<br>
                            <span style="color:#f59e0b; font-size: 14px;"><b>${etaMins} Min</b> away</span><br>
                            <small style="color:#94a3b8;">${distKm} km route</small><br><br>
                            <button class="btn-primary" onclick="bookDriver('${d.id}', ${lat}, ${lon}, ${d.lat}, ${d.lon})">Authorize Dispatch</button>
                        </div>
                    `).openPopup();
                });
            } else {
                log(`<span class="error">[Alert] No Class-${selectedAsset} assets available.</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Match engine unresponsive.</span>`);
        }
    }

    async function bookDriver(id, rLat, rLon, dLat, dLon) {
        log(`[Dispatch] Requesting lock for ${id}...`);
        try {
            const res = await fetch('http://localhost:6080/ride/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ driver_id: id })
            });
            const data = await res.json();

            if (res.ok) {
                const tripId = data.trip_id;
                log(`<span class="highlight">[Success] Asset ${id} locked to Trip #${tripId}.</span>`);
                
                // --- NEW v1.4: FETCH PHYSICAL ROUTE GEOMETRY ---
                log(`[Nav] Calculating Turn-by-Turn Route...`);
                const routeRes = await fetch(`http://localhost:6080/ride/route?src_lat=${dLat}&src_lon=${dLon}&dest_lat=${rLat}&dest_lon=${rLon}`);
                const geoJSON = await routeRes.json();

                // Clear the search phase dashed lines
                matchLines.forEach(line => map.removeLayer(line));
                matchLines = [];
                map.closePopup();

                // Draw the solid road-snapped GeoJSON line
                const routeLayer = L.geoJSON(geoJSON, {
                    style: { color: '#3b82f6', weight: 6, opacity: 0.9 }
                }).addTo(map);
                // ------------------------------------------------

                activeTrips[tripId] = { 
                    driver_id: id, 
                    status: 'driver_assigned',
                    routeLayer: routeLayer // Save it so we can delete it later
                };
                renderActiveTrips();

                const target = drivers.find(d => d.id === id);
                if (target) {
                    target.marker.setIcon(bookedIcon);
                    target.marker.setPopupContent(`<div style="text-align:center;"><b>${target.iconText} ${id}</b><br><span style="color:#ef4444">● Trip #${tripId}</span></div>`);
                }
            } else {
                log(`<span class="error">[Rejected] ${data.error}</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Dispatch system error.</span>`);
        }
    }

    async function advanceTrip(tripId) {
        const trip = activeTrips[tripId];
        if (!trip) return;

        let nextStatus = '';
        if (trip.status === 'driver_assigned') nextStatus = 'driver_arrived';
        else if (trip.status === 'driver_arrived') nextStatus = 'trip_started';
        else if (trip.status === 'trip_started') nextStatus = 'completed';

        log(`[FSM] Attempting transition: ${trip.status} ➔ ${nextStatus}`);

        try {
            const res = await fetch('http://localhost:6080/trip/status', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    trip_id: parseInt(tripId),
                    driver_id: trip.driver_id,
                    current_status: trip.status,
                    new_status: nextStatus
                })
            });
            const data = await res.json();

            if (res.ok) {
                log(`<span class="highlight">[Trip #${tripId}] Status advanced to: ${nextStatus}</span>`);

                if (nextStatus === 'completed') {
                    // NEW: Remove the navigation line from the map when trip is done
                    if (trip.routeLayer) {
                        map.removeLayer(trip.routeLayer);
                    }

                    delete activeTrips[tripId];
                    const target = drivers.find(d => d.id === trip.driver_id);
                    if (target) {
                        target.marker.setIcon(availableIcon);
                        target.marker.setPopupContent(`<div style="text-align:center;"><b>${target.iconText} ${trip.driver_id}</b><br><span style="color:#10b981">● Active</span></div>`);
                    }
                } else {
                    activeTrips[tripId].status = nextStatus;
                }
                renderActiveTrips();
            } else {
                log(`<span class="error">[Trip Error] ${data.error}</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Network error advancing trip.</span>`);
        }
    }

    function renderActiveTrips() {
        const container = document.getElementById('active-trips-container');
        container.innerHTML = ''; 

        const tripIds = Object.keys(activeTrips);
        if (tripIds.length === 0) {
            container.innerHTML = '<div style="font-size: 12px; color: var(--text-muted); font-style: italic;">No active trips. Book a ride to begin simulation.</div>';
            return;
        }

        tripIds.forEach(tripId => {
            const trip = activeTrips[tripId];
            let btnClass, btnText;

            if (trip.status === 'driver_assigned') {
                btnClass = 'btn-arrive'; btnText = 'Mark as Arrived';
            } else if (trip.status === 'driver_arrived') {
                btnClass = 'btn-start'; btnText = 'Start Ride';
            } else if (trip.status === 'trip_started') {
                btnClass = 'btn-complete'; btnText = 'Complete & Release';
            }

            const target = drivers.find(d => d.id === trip.driver_id);
            const iconToDisplay = target ? target.iconText : '🚖';

            const card = document.createElement('div');
            card.className = 'trip-card';
            card.innerHTML = `
                <div class="header">Trip #${tripId} | Asset: ${iconToDisplay} ${trip.driver_id}</div>
                <div class="status">Status: <span style="color:var(--accent-blue)">${trip.status}</span></div>
                <button class="${btnClass}" onclick="advanceTrip('${tripId}')">${btnText} ⏭️</button>
            `;
            container.appendChild(card);
        });
    }

    async function triggerSurgeSpike() {
        log(`<span class="highlight">⚡ WARNING: Incoming Demand Spike Detected!</span>`);
        for (let i = 0; i < 30; i++) {
            const fakeLat = CHENNAI_CENTER[0] + (Math.random() - 0.5) * 0.02;
            const fakeLon = CHENNAI_CENTER[1] + (Math.random() - 0.5) * 0.02;
            // Silent background fetches to inflate the demand array
            fetch(`http://localhost:6080/ride/match?lat=${fakeLat}&lon=${fakeLon}&asset_type=4`).catch(e => {});
        }
        setTimeout(() => {
            log(`[System] Demand registered. Try requesting a ride now to see Surge Pricing.`);
        }, 1000);
    }

    function log(msg) {
        const div = document.getElementById('logs');
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        div.innerHTML = `<div><span class="time">[${time}]</span> ${msg}</div>` + div.innerHTML;
    }
    function clearMap() { location.reload(); }
</script>
</body>
</html>
