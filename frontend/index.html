<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polaris Dispatcher Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border: #334155;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Sidebar Styling */
        #sidebar { 
            width: 350px; 
            padding: 25px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 24px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group { 
            background: var(--bg-dark); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            margin-bottom: 20px; 
        }

        /* Custom Radio Buttons */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Buttons */
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 12px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px;
            transition: all 0.2s ease; 
        }
        .btn-primary { 
            background-color: var(--accent-blue); 
            color: white; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-danger { 
            background-color: transparent; 
            color: var(--accent-red); 
            border: 1px solid var(--accent-red);
        }
        .btn-danger:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Terminal Log Styling */
        h3 { margin-bottom: 10px; font-size: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .log { 
            font-size: 12px; 
            flex-grow: 1; 
            overflow-y: auto; 
            background: #000; 
            padding: 15px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: 'Courier New', monospace; 
            color: #10b981;
        }
        .log div { margin-bottom: 6px; line-height: 1.4; }
        .log .time { color: #64748b; margin-right: 8px; }
        .log .error { color: #ef4444; }

        /* Map Container */
        #map { flex-grow: 1; background: #000; }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel);
            color: var(--text-main);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .leaflet-popup-tip { background: var(--bg-panel); }
        .popup-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .popup-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div id="sidebar">

        <strong style="color: var(--text-muted);">Operation Mode</strong>
        <div class="radio-group">

<script>
    // 1. Initialize Map with a Dark Theme
    const CHENNAI_CENTER = [13.0418, 80.2341];
    const map = L.map('map').setView(CHENNAI_CENTER, 14);
    
    // Using CartoDB Dark Matter tiles for a dispatcher look

        maxZoom: 20
    }).addTo(map);

    let matchLines = [];

        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/markers-default/blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const bookedIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/markers-default/red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // 2. Map Interactions
    map.on('click', function(e) {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        if (mode === 'spawn') {
            spawnDriverBot(e.latlng.lat, e.latlng.lng);
        } else {
            findRide(e.latlng.lat, e.latlng.lng);
        }
    });

    function simulateChennaiTraffic() {
        log("Initiating Fleet Deployment...");
        for (let i = 0; i < 10; i++) {
            const latOffset = (Math.random() - 0.5) * 0.04; 
            const lonOffset = (Math.random() - 0.5) * 0.04;
            setTimeout(() => {
                spawnDriverBot(CHENNAI_CENTER[0] + latOffset, CHENNAI_CENTER[1] + lonOffset);
            }, i * 150);
        }
    }

    // 3. WebSocket Integration
    function spawnDriverBot(startLat, startLon) {
        const id = "V-" + Math.floor(Math.random() * 10000);
        const socket = new WebSocket("ws://localhost:6080/ws/driver");
        
        const marker = L.marker([startLat, startLon], {icon: availableIcon}).addTo(map)
            .bindPopup(`<div style="text-align:center;"><b>${id}</b><br><span style="color:#10b981">● Active</span></div>`);
        
        drivers.push({ id: id, marker: marker });

        socket.onopen = () => {
            log(`[Uplink] ${id} telemetry active.`);
            let angle = Math.random() * Math.PI * 2; 
            const speed = 0.0001 + (Math.random() * 0.0001);

            setInterval(() => {
                if (socket.readyState !== WebSocket.OPEN) return;
                angle += (Math.random() - 0.5) * 0.1; 
                const newLat = marker.getLatLng().lat + Math.sin(angle) * speed;
                const newLon = marker.getLatLng().lng + Math.cos(angle) * speed;

                marker.setLatLng([newLat, newLon]);
                socket.send(JSON.stringify({ driver_id: id, lat: newLat, lon: newLon }));
            }, 1000);
        };
        socket.onerror = () => log(`<span class="error">[Fault] Connection lost for ${id}</span>`);
    }

    // 4. Spatial Matching API

    //     matchLines = [];
    //     log(`[Query] Scanning coordinates: ${lat.toFixed(4)}, ${lon.toFixed(4)}...`);

    //     try {
    //         const res = await fetch(`http://localhost:6080/ride/match?lat=${lat}&lon=${lon}`);

    //         if (data.matches && data.matches.length > 0) {
    //             log(`[Match] Located ${data.matches.length} available vehicles.`);
                
    //             data.matches.forEach(d => {
    //                 const line = L.polyline([[lat, lon], [d.Lat, d.Lon]], { 
    //                     color: '#3b82f6', dashArray: '5, 10', weight: 2, opacity: 0.7
    //                 }).addTo(map);
    //                 matchLines.push(line);

    //                 line.bindPopup(`
    //                     <div style="text-align:center;">
    //                         <b>Asset: ${d.ID}</b><br>
    //                         Status: Available<br>
    //                         <button class="popup-btn" onclick="bookDriver('${d.ID}')">Authorize Dispatch</button>
    //                     </div>
    //                 `).openPopup();
    //             });
    //         } else {
    //             log(`<span class="error">[Alert] No assets within operational radius.</span>`);
    //         }
    //     } catch (err) {
    //         log(`<span class="error">[Fault] Match engine unresponsive.</span>`);
    //     }
    // }
    async function findRide(lat, lon) {
        matchLines.forEach(line => map.removeLayer(line));
        matchLines = [];
        log(`[Query] Scanning coordinates: ${lat.toFixed(4)}, ${lon.toFixed(4)}...`);


        try {
            const res = await fetch(`http://localhost:6080/ride/match?lat=${lat}&lon=${lon}`);
            const data = await res.json();

            if (data.matches && data.matches.length > 0) {
                log(`[Match] Located ${data.matches.length} available vehicles.`);
                
                data.matches.forEach(d => {
                    // const line = L.polyline([[lat, lon], [d.lat, d.lon]], { 
                    //     color: '#3b82f6', dashArray: '5, 10', weight: 2, opacity: 0.7
                    // }).addTo(map);
                    // matchLines.push(line);
                    // line.bindPopup(`
                    //     <div style="text-align:center;">
                    //         <b>Asset: ${d.id}</b><br>
                    //         Status: Available<br>
                    //         <button class="popup-btn" onclick="bookDriver('${d.id}')">Authorize Dispatch</button>
                    //     </div>
                    // `).openPopup();

                    const etaMins = Math.round(d.eta_seconds / 60);
                    const distKm = (d.route_distance_meters / 1000).toFixed(1);

                    const line = L.polyline([[lat, lon], [d.lat, d.lon]], { 
                        color: '#2ecc71', weight: 4, dashArray: '10, 10' 
                    }).addTo(map);
                    matchLines.push(line);

                    line.bindPopup(`
                        <div style="text-align:center;">
                            <b>🚖 Driver ${d.id}</b><br>
                            <span style="color:#e67e22; font-size: 16px;"><b>${etaMins} Min</b> away</span><br>
                            <small style="color:#7f8c8d;">${distKm} km drive</small><br><br>
                            <button onclick="bookDriver('${d.id}')" style="background:#2ecc71; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; width:100%;">

                            </button>
                        </div>
                    `).openPopup();
                });
            } else {
                log(`<span class="error">[Alert] No assets within operational radius.</span>`);
            }
        } catch (err) {
            console.error(err); // Added this so you can see exact errors in the browser console!
            log(`<span class="error">[Fault] Match engine unresponsive.</span>`);
        }
    }

    // 5. Booking API
    async function bookDriver(id) {
        log(`[Dispatch] Requesting lock for ${id}...`);
        
        try {
            const res = await fetch('http://localhost:6080/ride/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ driver_id: id })
            });
            const data = await res.json();

            if (res.ok) {
                log(`[Success] Asset ${id} locked and dispatched.`);
                
                // Update marker visually
                const target = drivers.find(d => d.id === id);
                if (target) {
                    target.marker.setIcon(bookedIcon);
                    target.marker.setPopupContent(`<div style="text-align:center;"><b>${id}</b><br><span style="color:#ef4444">● Dispatched</span></div>`);
                    map.closePopup();
                }
            } else {
                log(`<span class="error">[Rejected] ${data.error}</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Dispatch system error.</span>`);
        }
    }

    // Utilities
    function log(msg) {
        const div = document.getElementById('logs');
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        div.innerHTML = `<div><span class="time">[${time}]</span> ${msg}</div>` + div.innerHTML;
    }
    function clearMap() { location.reload(); }
</script>
