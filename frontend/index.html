<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polaris Dispatcher Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --border: #334155;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Sidebar Styling */
        #sidebar { 
            width: 380px; 
            padding: 20px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        
        h2 { margin-top: 0; color: var(--text-main); font-size: 22px; display: flex; align-items: center; gap: 10px; }
        h3 { margin-bottom: 10px; margin-top: 20px; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .control-group { 
            background: var(--bg-dark); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            margin-bottom: 15px; 
        }

        /* Buttons */
        button { 
            width: 100%; padding: 10px; margin-top: 8px; cursor: pointer; border: none; 
            border-radius: 6px; font-weight: 600; font-size: 13px; transition: all 0.2s ease; 
        }
        .btn-primary { background-color: var(--accent-blue); color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-danger { background-color: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); }
        .btn-danger:hover { background-color: rgba(239, 68, 68, 0.1); }
        
        /* FSM Buttons */
        .btn-arrive { background-color: var(--accent-orange); color: white; }
        .btn-start { background-color: var(--accent-blue); color: white; }
        .btn-complete { background-color: var(--accent-green); color: white; }

        /* Trip Simulator Cards */
        .trip-card {
            background: #0f172a; border-left: 4px solid var(--accent-blue);
            padding: 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .trip-card .header { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .trip-card .status { font-size: 14px; font-weight: bold; margin-bottom: 8px; }

        /* Terminal Log Styling */
        .log { 
            font-size: 11px; flex-grow: 1; overflow-y: auto; background: #000; 
            padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            font-family: 'Courier New', monospace; color: #10b981; min-height: 150px;
        }
        .log div { margin-bottom: 4px; line-height: 1.4; }
        .log .time { color: #64748b; margin-right: 8px; }
        .log .error { color: #ef4444; }
        .log .highlight { color: #facc15; }

        #map { flex-grow: 1; background: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>✨ Polaris Engine v1.1</h2>
    
    <div class="control-group">
        <strong style="color: var(--text-muted); font-size: 13px;">Operation Mode</strong>
        <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 14px;">
            <label><input type="radio" name="mode" value="spawn" checked> 🚖 Spawn Asset</label>
            <label><input type="radio" name="mode" value="find"> 🔍 Request Match</label>
        </div>
    </div>

    <h3>📡 Active Trip Operations</h3>
    <div id="active-trips-container">
        <div style="font-size: 12px; color: var(--text-muted); font-style: italic;">No active trips. Book a ride to begin simulation.</div>
    </div>

    <h3>System Telemetry</h3>
    <div id="logs" class="log"></div>

    <div style="margin-top: 10px;">
        <button class="btn-primary" onclick="simulateChennaiTraffic()">Deploy 10 Test Vehicles</button>
        <button class="btn-danger" onclick="clearMap()">Purge System (Reset)</button>
    </div>
</div>

<div id="map"></div>

<script>
    const CHENNAI_CENTER = [13.0418, 80.2341];
    const map = L.map('map').setView(CHENNAI_CENTER, 14);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors, © CARTO'
    }).addTo(map);

    let drivers = [];
    let matchLines = [];
    let activeTrips = {}; // Store our running FSM states

    // Icons
    const availableIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/markers-default/blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
    });

    const bookedIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/markers-default/red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
    });

    map.on('click', function(e) {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        if (mode === 'spawn') spawnDriverBot(e.latlng.lat, e.latlng.lng);
        else findRide(e.latlng.lat, e.latlng.lng);
    });

    function simulateChennaiTraffic() {
        log("Initiating Fleet Deployment...");
        for (let i = 0; i < 10; i++) {
            setTimeout(() => {
                spawnDriverBot(CHENNAI_CENTER[0] + (Math.random() - 0.5) * 0.04, CHENNAI_CENTER[1] + (Math.random() - 0.5) * 0.04);
            }, i * 150);
        }
    }

    function spawnDriverBot(startLat, startLon) {
        const id = "V-" + Math.floor(Math.random() * 10000);
        const socket = new WebSocket("ws://localhost:6080/ws/driver");
        
        const marker = L.marker([startLat, startLon], {icon: availableIcon}).addTo(map)
            .bindPopup(`<div style="text-align:center;"><b>${id}</b><br><span style="color:#10b981">● Active</span></div>`);
        
        drivers.push({ id: id, marker: marker });

        socket.onopen = () => {
            log(`[Uplink] ${id} telemetry active.`);
            let angle = Math.random() * Math.PI * 2; 
            const speed = 0.0001 + (Math.random() * 0.0001);

            setInterval(() => {
                if (socket.readyState !== WebSocket.OPEN) return;
                angle += (Math.random() - 0.5) * 0.1; 
                const newLat = marker.getLatLng().lat + Math.sin(angle) * speed;
                const newLon = marker.getLatLng().lng + Math.cos(angle) * speed;
                marker.setLatLng([newLat, newLon]);
                socket.send(JSON.stringify({ driver_id: id, lat: newLat, lon: newLon }));
            }, 1000);
        };
    }

    async function findRide(lat, lon) {
        matchLines.forEach(line => map.removeLayer(line));
        matchLines = [];
        log(`[Query] Scanning coordinates...`);

        try {
            const res = await fetch(`http://localhost:6080/ride/match?lat=${lat}&lon=${lon}`);
            const data = await res.json();

            if (data.matches && data.matches.length > 0) {
                log(`[Match] Located ${data.matches.length} vehicles.`);
                
                data.matches.forEach(d => {
                    const etaMins = d.eta_seconds ? Math.round(d.eta_seconds / 60) : "?";
                    const distKm = d.route_distance_meters ? (d.route_distance_meters / 1000).toFixed(1) : "?";

                    const line = L.polyline([[lat, lon], [d.lat, d.lon]], { 
                        color: '#3b82f6', dashArray: '5, 10', weight: 2 
                    }).addTo(map);
                    matchLines.push(line);

                    line.bindPopup(`
                        <div style="text-align:center;">
                            <b>🚖 ${d.id}</b><br>
                            <span style="color:#f59e0b; font-size: 15px;"><b>${etaMins} Min</b> away</span><br>
                            <small style="color:#94a3b8;">${distKm} km route</small><br><br>
                            <button class="btn-primary" onclick="bookDriver('${d.id}')">Authorize Dispatch</button>
                        </div>
                    `).openPopup();
                });
            } else {
                log(`<span class="error">[Alert] No assets available.</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Match engine unresponsive.</span>`);
        }
    }

    // 1. UPDATED BOOKING FUNCTION
    async function bookDriver(id) {
        log(`[Dispatch] Requesting lock for ${id}...`);
        try {
            const res = await fetch('http://localhost:6080/ride/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ driver_id: id })
            });
            const data = await res.json();

            if (res.ok) {
                const tripId = data.trip_id;
                log(`<span class="highlight">[Success] Asset ${id} locked to Trip #${tripId}.</span>`);
                
                // Track trip in our JS object
                activeTrips[tripId] = { driver_id: id, status: 'driver_assigned' };
                renderActiveTrips(); // Draw the UI card

                // Update marker visually
                const target = drivers.find(d => d.id === id);
                if (target) {
                    target.marker.setIcon(bookedIcon);
                    target.marker.setPopupContent(`<div style="text-align:center;"><b>${id}</b><br><span style="color:#ef4444">● Trip #${tripId}</span></div>`);
                    map.closePopup();
                }
            } else {
                log(`<span class="error">[Rejected] ${data.error}</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Dispatch system error.</span>`);
        }
    }

    // 2. NEW FSM PROGRESSION FUNCTION
    async function advanceTrip(tripId) {
        const trip = activeTrips[tripId];
        if (!trip) return;

        // FSM Logic to determine the NEXT target state
        let nextStatus = '';
        if (trip.status === 'driver_assigned') nextStatus = 'driver_arrived';
        else if (trip.status === 'driver_arrived') nextStatus = 'trip_started';
        else if (trip.status === 'trip_started') nextStatus = 'completed';

        log(`[FSM] Attempting transition: ${trip.status} ➔ ${nextStatus}`);

        try {
            const res = await fetch('http://localhost:6080/trip/status', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    trip_id: parseInt(tripId),
                    driver_id: trip.driver_id,
                    current_status: trip.status,
                    new_status: nextStatus
                })
            });
            const data = await res.json();

            if (res.ok) {
                log(`<span class="highlight">[Trip #${tripId}] Status advanced to: ${nextStatus}</span>`);

                if (nextStatus === 'completed') {
                    // Cleanup Trip
                    delete activeTrips[tripId];
                    
                    // Release the driver visually back to Blue
                    const target = drivers.find(d => d.id === trip.driver_id);
                    if (target) {
                        target.marker.setIcon(availableIcon);
                        target.marker.setPopupContent(`<div style="text-align:center;"><b>${trip.driver_id}</b><br><span style="color:#10b981">● Active</span></div>`);
                    }
                } else {
                    // Just update state in UI
                    activeTrips[tripId].status = nextStatus;
                }
                renderActiveTrips(); // Redraw UI
            } else {
                log(`<span class="error">[Trip Error] ${data.error}</span>`);
            }
        } catch (err) {
            log(`<span class="error">[Fault] Network error advancing trip.</span>`);
        }
    }

    // 3. NEW UI RENDERER FOR SIDEBAR
    function renderActiveTrips() {
        const container = document.getElementById('active-trips-container');
        container.innerHTML = ''; 

        const tripIds = Object.keys(activeTrips);
        if (tripIds.length === 0) {
            container.innerHTML = '<div style="font-size: 12px; color: var(--text-muted); font-style: italic;">No active trips. Book a ride to begin simulation.</div>';
            return;
        }

        tripIds.forEach(tripId => {
            const trip = activeTrips[tripId];
            let btnClass, btnText;

            // Render buttons based on current FSM state
            if (trip.status === 'driver_assigned') {
                btnClass = 'btn-arrive'; btnText = 'Mark as Arrived';
            } else if (trip.status === 'driver_arrived') {
                btnClass = 'btn-start'; btnText = 'Start Ride';
            } else if (trip.status === 'trip_started') {
                btnClass = 'btn-complete'; btnText = 'Complete & Release';
            }

            const card = document.createElement('div');
            card.className = 'trip-card';
            card.innerHTML = `
                <div class="header">Trip #${tripId} | Asset: ${trip.driver_id}</div>
                <div class="status">Status: <span style="color:var(--accent-blue)">${trip.status}</span></div>
                <button class="${btnClass}" onclick="advanceTrip('${tripId}')">${btnText} ⏭️</button>
            `;
            container.appendChild(card);
        });
    }

    function log(msg) {
        const div = document.getElementById('logs');
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        div.innerHTML = `<div><span class="time">[${time}]</span> ${msg}</div>` + div.innerHTML;
    }
    function clearMap() { location.reload(); }
</script>

</body>
</html>
